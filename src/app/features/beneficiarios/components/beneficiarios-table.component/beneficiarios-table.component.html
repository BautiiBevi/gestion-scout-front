<div class="card bg-base-100 shadow-xl overflow-x-auto">
  <table class="table table-zebra w-full">
    <thead class="bg-base-300 text-base-content text-sm">
      <tr>
        <th>Nombre Completo</th>
        <th>DNI</th>
        <th>Rama Actual</th>
        <th class="text-center">Acciones</th>
      </tr>
    </thead>
    <tbody>
      @for (b of beneficiarios; track b.id_beneficiario) {
        <tr class="hover">
          <td class="font-medium">{{ b.apellido }}, {{ b.nombre }}</td>
          <td>{{ b.dni }}</td>
          <td>
            <div
              class="badge badge-outline"
              [class.badge-warning]="b.rama_actual === 'Manada'"
              [class.badge-success]="b.rama_actual === 'Unidad'"
              [class.badge-info]="b.rama_actual === 'Caminantes'"
              [class.badge-error]="b.rama_actual === 'Rovers'"
            >
              {{ b.rama_actual }}
            </div>
          </td>
          <td class="text-center">
            <div class="flex justify-center gap-2">
              <button
                [routerLink]="['/beneficiarios', b.id_beneficiario, 'cuenta']"
                class="btn btn-sm btn-outline btn-success"
              >
                💵 Cuenta
              </button>
              <button
                [routerLink]="['/beneficiarios/editar', b.id_beneficiario]"
                class="btn btn-sm btn-outline btn-primary"
              >
                Editar
              </button>
              <button class="btn btn-sm btn-outline btn-error" (click)="eliminar(b)">
                Eliminar
              </button>
            </div>
          </td>
        </tr>
      } @empty {
        <tr>
          <td colspan="4" class="text-center py-8 text-base-content/50">
            No hay beneficiarios registrados en el sistema.
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
